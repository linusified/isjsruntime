name: Publish
on:
  push:
    tags:
      - "v*"
jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## ${VERSION}/{found=1; next} found && /^## /{exit} found" CHANGELOG.md)
          # Fallback if version not found in changelog
          if [[ -z "$NOTES" ]]; then
            NOTES="See [README.md](./README.md) and [CHANGELOG.md](./CHANGELOG.md) for details."
          fi
          # Inject changelog notes into README.md after the marker
          MARKER="<!--CHANGELOG_MARKER-->"
          README_BEFORE=$(awk "/$MARKER/{print; exit} {print}" README.md)
          echo -e "$README_BEFORE\n\n$NOTES" > README.md
          # Commit updated README
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update changelog in README for ${TAG}" || echo "No changes to commit"
          git push origin HEAD:main
          if [[ "$TAG" == *"-alpha"* || "$TAG" == *"-beta"* || "$TAG" == *"-rc"* ]]; then
            gh release create "$TAG" --prerelease --notes "$NOTES" --title "$TAG"
          else
            gh release create "$TAG" --notes "$NOTES" --title "$TAG"
          fi

  publish-jsr:
    name: Publish to JSR
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno task isitclean
      - name: Sync version from tag into deno.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$(jq --arg v "$VERSION" '.version = $v' deno.json)" > deno.json
      - run: deno publish

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Sync version from tag into package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$(jq --arg v "$VERSION" '.version = $v' package.json)" > package.json
      - name: Build
        run: deno run -A scripts/build_npm.ts
      - name: Publish
        run: |
          TAG="latest"
          if [[ "${GITHUB_REF_NAME}" == *"-beta"* ]]; then TAG="beta"
          elif [[ "${GITHUB_REF_NAME}" == *"-alpha"* ]]; then TAG="alpha"
          elif [[ "${GITHUB_REF_NAME}" == *"-rc"* ]]; then TAG="rc"
          fi
          npm publish --access public --tag $TAG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
